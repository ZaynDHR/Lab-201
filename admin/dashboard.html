<html lang="fr">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Admin YAMOTO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    /* ── DATE PICKER ── */
    .date-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .date-input-wrapper input[type="date"] {
      width: 100%;
      padding-right: 2.5rem;
      cursor: text;
    }
    .date-input-wrapper input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 0;
      position: absolute;
      right: 0;
      width: 2.5rem;
      height: 100%;
      cursor: pointer;
    }
    .date-calendar-icon {
      position: absolute;
      right: 0.75rem;
      pointer-events: none;
      color: #c8001a;
      display: flex;
      align-items: center;
    }

    /* ── COUNTRY AUTOCOMPLETE ── */
    .country-wrapper {
      position: relative;
    }
    .country-wrapper input {
      width: 100%;
    }
    .country-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #111;
      border: 1px solid #333;
      max-height: 220px;
      overflow-y: auto;
      z-index: 999;
      scrollbar-width: thin;
      scrollbar-color: #c8001a #111;
    }
    .country-dropdown.open { display: block; }
    .country-option {
      padding: 0.6rem 1rem;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: background 0.15s;
    }
    .country-option:hover,
    .country-option.active {
      background: #1a1a1a;
      color: #fff;
    }
    .country-flag { font-size: 16px; }
    .country-no-result {
      padding: 0.75rem 1rem;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: #555;
      font-style: italic;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="admin-nav">
    <div class="admin-nav-logo">
      <img src="../png/yamoto.png" alt="Yamoto" class="nav-logo-img">
      <span class="nav-admin-tag">/ ADMIN</span>
    </div>
    <div class="admin-nav-right">
      <span class="admin-nav-user" id="nav-user"></span>
      <button class="btn-logout" id="btn-logout">Déconnexion</button>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="admin-main">

    <div class="admin-header">
      <div class="admin-title">
        <span>Gestion des dates</span>
        Tournée 2026
      </div>
      <button class="btn-primary" id="btn-add">+ Ajouter une date</button>
    </div>

    <!-- TABLE -->
    <table class="concerts-table" id="concerts-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Ville</th>
          <th>Pays</th>
          <th>Lieu / Festival</th>
          <th>Statut</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="concerts-body">
        <tr>
          <td colspan="6">
            <div class="empty-state">
              <p>Chargement...</p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>

  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-title" id="modal-title">Ajouter une date</div>

      <input type="hidden" id="concert-id">

      <!-- DATE -->
      <div class="form-field">
        <label for="input-date">Date du concert</label>
        <div class="date-input-wrapper">
          <input type="date" id="input-date">
          <span class="date-calendar-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          </span>
        </div>
      </div>

      <!-- VILLE -->
      <div class="form-field">
        <label for="input-ville">Ville</label>
        <input type="text" id="input-ville" placeholder="Paris">
      </div>

      <!-- PAYS — autocomplete -->
      <div class="form-field">
        <label for="input-pays">Pays</label>
        <div class="country-wrapper">
          <input type="text" id="input-pays" placeholder="Rechercher un pays..." autocomplete="off">
          <div class="country-dropdown" id="country-dropdown"></div>
        </div>
      </div>

      <!-- LIEU -->
      <div class="form-field">
        <label for="input-lieu">Lieu / Festival</label>
        <input type="text" id="input-lieu" placeholder="Zénith Paris — La Villette">
      </div>

      <!-- SOLD OUT -->
      <div class="form-checkbox">
        <input type="checkbox" id="input-soldout">
        <label for="input-soldout">Sold-out</label>
      </div>

      <div class="form-actions">
        <button class="btn-primary" id="btn-save">Enregistrer</button>
        <button class="btn-secondary" id="btn-cancel">Annuler</button>
      </div>

    </div>
  </div>

      { name: "Zambie", flag: "🇿🇲" },
      { name: "Zimbabwe", flag: "🇿🇼" },
    ];

    const input = document.getElementById('input-pays');
    const dropdown = document.getElementById('country-dropdown');
    let activeIndex = -1;

    function renderDropdown(list) {
      dropdown.innerHTML = '';
      if (list.length === 0) {
        dropdown.innerHTML = '<div class="country-no-result">Aucun pays trouvé</div>';
      } else {
        list.forEach((c, i) => {
          const div = document.createElement('div');
          div.className = 'country-option';
          div.innerHTML = `<span class="country-flag">${c.flag}</span><span>${c.name}</span>`;
          div.addEventListener('mousedown', () => {
            input.value = c.name;
            dropdown.classList.remove('open');
          });
          dropdown.appendChild(div);
        });
      }
      activeIndex = -1;
    }

    input.addEventListener('focus', () => {
      renderDropdown(COUNTRIES);
      dropdown.classList.add('open');
    });

    input.addEventListener('input', () => {
      const q = input.value.toLowerCase().trim();
      const filtered = q
        ? COUNTRIES.filter(c => c.name.toLowerCase().includes(q))
        : COUNTRIES;
      renderDropdown(filtered);
      dropdown.classList.add('open');
    });

    input.addEventListener('keydown', (e) => {
      const options = dropdown.querySelectorAll('.country-option');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, options.length - 1);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIndex = Math.max(activeIndex - 1, 0);
      } else if (e.key === 'Enter' && activeIndex >= 0) {
        e.preventDefault();
        options[activeIndex].dispatchEvent(new Event('mousedown'));
        return;
      } else if (e.key === 'Escape') {
        dropdown.classList.remove('open');
        return;
      }
      options.forEach((o, i) => o.classList.toggle('active', i === activeIndex));
      if (options[activeIndex]) options[activeIndex].scrollIntoView({ block: 'nearest' });
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.country-wrapper')) {
        dropdown.classList.remove('open');
      }
    });
