<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/Tournee.css">
<link rel="stylesheet" href="assets/main.css">
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo"><a href="index.html">MAK<span>●</span>ALA</a></div>
  <ul class="nav-links">
    <li><a href="album.html">Album</a></li>
    <li><a href="artiste.html">Artiste</a></li>
    <li><a href="tournee.html" class="active">Tournée</a></li>
    <li><a href="actualites.html">Actualités</a></li>
  </ul>
</nav>
<a href="pages/tournee.html" class="nav-cta">Billets →</a>

<!-- TOUR -->
<section id="tour" class="page-section">
  <div class="section-header reveal">
    <span class="section-title">Tournée</span>
    <span class="section-count">YAMOTO Tour 2026</span>
  </div>
  <div class="tour-list" id="tour-list">
    <div class="tour-loading">Chargement des dates...</div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">MAKALA — YAMOTO</div>
  <div class="footer-copy">© 2026 Colors Records / Capitol Music France</div>
  <a href="admin/index.html" class="footer-admin">Admin ↗</a>
</footer>

<script type="module">
  import { supabase } from './assets/js/supabase.js';

  // ─── FORMAT DATE ───────────────────────────────────────
  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const day   = d.toLocaleDateString('fr-FR', { day: '2-digit' });
    const month = d.toLocaleDateString('fr-FR', { month: 'short' }).toUpperCase().replace('.', '');
    return `${day} ${month}`;
  }

  // ─── RENDER CONCERTS ───────────────────────────────────
  function renderConcerts(data) {
    const list = document.getElementById('tour-list');

    if (!data.length) {
      list.innerHTML = `<div class="tour-empty">Aucune date annoncée pour le moment.</div>`;
      return;
    }

    list.innerHTML = data.map(c => `
      <div class="tour-item reveal">
        <div class="tour-date">${formatDate(c.date_concert)}</div>
        <div>
          <div class="tour-city">${c.ville}</div>
          <div class="tour-venue">${c.lieu}</div>
        </div>
        <div class="tour-country">${c.pays}</div>
        ${c.sold_out
          ? `<span class="tour-ticket sold-out">Complet</span>`
          : `<a href="#" class="tour-ticket">Billetterie</a>`
        }
      </div>
    `).join('');

    // Scroll reveal sur les nouveaux éléments
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), 80);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  }

  // ─── CHARGER LES DATES ─────────────────────────────────
  async function loadConcerts() {
    const { data, error } = await supabase
      .from('concerts')
      .select('*')
      .order('date_concert', { ascending: true });

    if (error) {
      document.getElementById('tour-list').innerHTML =
        `<div class="tour-empty">Erreur de chargement des dates.</div>`;
      return;
    }

    renderConcerts(data);
  }

  // ─── TEMPS RÉEL ────────────────────────────────────────
  supabase
    .channel('concerts-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'concerts' }, () => {
      loadConcerts();
    })
    .subscribe();

  // ─── INIT ──────────────────────────────────────────────
  loadConcerts();

  // Scroll reveal section header
  document.querySelectorAll('.reveal').forEach(el => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), 80);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    observer.observe(el);
  });
</script>

</body>
</html>
